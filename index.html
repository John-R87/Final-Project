<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js"></script>
    <script src="https://kit.fontawesome.com/04e00b3a8d.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="landing">
        <nav>
   <div class="nav__row">
    <div class="nav__logo--title">Movie Finder</div>
    <div class="nav__logo">
    <div class="nav__logo--img">
        <i class="fa-solid fa-video"></i></div>
    </div>
    </div>
    <div class="nav__links">
        <a href="#" class="link">Refresh</a>
        <a href="#" class="link">Contact</a>
    </div>
    <div class="container">
    <div class="row">
      <div class="movie-list">
        <div class="movie">
          <div class="movie-card">
            <div class="movie-card__container">
              <h3>Movie Title</h4>
                <p><b>Film:</b> email@email.com</p>
                <p><b>Phone:</b> 0000000000</p>
                <p><b>Website:</b> <a href="https://website.website" target="_blank">website.website</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
<input type="title" placeholder="1" onchange="onSearchChange(event)">
    </nav>
    </section>
    
    <main>
        <form action="/search" method="GET" class="search-form">
  <label for="site-search" class="visually-hidden">Search the site:</label>
  <input type="search" id="site-search" name="q" placeholder="Search here..." required>
  <button type="submit">Search</button>
</form>
    <div class="filter__wrapper">
     <select class="movie--filter" id="filter" onchange="filterMovies(event)">
        <option value disabled selected>sort</option>
        <option value="A-Z">A to Z</option>
        <option value="Z-A">Z to A</option>
        <option value="RATING">Rating</option>
     </select>
    </div>
    </main>
<footer>
    <div class="footer__row">
        <div class="footer__column">
            <a href="#" class="footer__column--link">Back to the top</a>
        </div>
    </div>
</footer>
</body>
</html>
